name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-amd64:
    name: Docker (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/pushkar-anand/jn-66:${{ github.event.release.tag_name }}-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-arm64:
    name: Docker (linux/arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/pushkar-anand/jn-66:${{ github.event.release.tag_name }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-manifest:
    name: Docker manifest
    needs: [docker-amd64, docker-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          TAG=${{ github.event.release.tag_name }}
          docker buildx imagetools create \
            -t ghcr.io/pushkar-anand/jn-66:${TAG} \
            -t ghcr.io/pushkar-anand/jn-66:latest \
            ghcr.io/pushkar-anand/jn-66:${TAG}-amd64 \
            ghcr.io/pushkar-anand/jn-66:${TAG}-arm64
