services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: finagent
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: finagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finagent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
