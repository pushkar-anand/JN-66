version: "2"
sql:
  - engine: postgresql
    queries: internal/db/queries
    schema: internal/db/migrations
    gen:
      go:
        package: sqlcgen
        out: internal/sqlc
        sql_package: pgx/v5
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        overrides:
          - db_type: uuid
            go_type: github.com/google/uuid.UUID
          - column: "transactions.amount"
            go_type:
              import: github.com/pushkaranand/finagent/internal/model
              package: model
              type: Money
          - column: "transactions.original_amount"
            go_type:
              import: github.com/pushkaranand/finagent/internal/model
              package: model
              type: Money
          - column: "transaction_splits.amount"
            go_type:
              import: github.com/pushkaranand/finagent/internal/model
              package: model
              type: Money
          - column: "recurring_payments.expected_amount"
            go_type:
              import: github.com/pushkaranand/finagent/internal/model
              package: model
              type: Money
          - column: "recurring_payments.amount_variance"
            go_type:
              import: github.com/pushkaranand/finagent/internal/model
              package: model
              type: Money
          - db_type: vector
            go_type:
              import: github.com/pgvector/pgvector-go
              package: pgvector
              type: Vector
