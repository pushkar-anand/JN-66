database:
  url: "postgres://finagent:secret@localhost:5432/finagent?sslmode=disable"
  max_connections: 10
  auto_migrate: true

llm:
  base_url: "http://localhost:11434/v1"
  api_key: ""           # set via FINAGENT_LLM__API_KEY env var or fill here
  routing:
    chat_model:      "qwen3.5:9b"
    analysis_model:  "qwen3.5:9b"
    tagging_model:   "qwen3.5:9b"
    embed_model:     "nomic-embed-text"
    summarize_model: "qwen3.5:9b"

agent:
  max_tool_rounds:  20
  history_messages: 20

channel:
  cli:
    default_user: "alice"

api:
  listen: ":8082"
